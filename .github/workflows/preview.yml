name: Preview — Firebase Hosting (Dev Channel)

# @ai_context: Deploy ke Firebase Hosting PREVIEW CHANNEL untuk branch non-main.
# Preview channel = URL temporary gratis, TERPISAH dari produksi.
# Tujuan: owner/developer bisa cek perubahan UI/UX sebelum merge ke main.
#
# ARSITEKTUR DEV/PROD:
#   main branch      → https://psa-business-suite.web.app          (PRODUKSI)
#   PR / develop     → https://psa-business-suite--pr-NNN-hash.web.app  (PREVIEW)
#
# Preview channel OTOMATIS:
#   - Dibuat saat PR dibuka
#   - URL diposting sebagai komentar di PR
#   - Dihapus otomatis 7 hari setelah PR ditutup (tidak ada biaya tersisa)

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [develop, 'ui/**', 'ux/**', 'feature/**', 'fix/**']

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview_deploy:
    name: Build → Deploy Preview Channel
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      pull-requests: write  # Untuk posting komentar URL preview ke PR

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2

      - name: Setup Node.js 22
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Preview
        run: npm run build
        env:
          # Firebase Core — sama dengan produksi
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          # Security
          VITE_CRYPTO_PEPPER: ${{ secrets.VITE_CRYPTO_PEPPER }}
          VITE_RECAPTCHA_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_SITE_KEY }}
          # AI Proxy (dev pakai proxy yang sama dengan produksi)
          VITE_GEMINI_PROXY_URL: ${{ secrets.VITE_GEMINI_PROXY_URL }}
          # Flag: ini adalah build PREVIEW — bisa dipakai untuk menampilkan banner dev
          VITE_IS_PREVIEW: 'true'
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

      # Deploy ke Preview Channel — URL otomatis di-post ke PR
      - name: Deploy ke Firebase Preview Channel
        id: preview_deploy
        uses: FirebaseExtended/action-hosting-deploy@0cbcac4740c2bfb00d632f0b863b57713124eb5a # v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: '${{ secrets.FIREBASE_PROJECT_ID }}'
          # channelId TIDAK di-set = otomatis generate per-PR
          expires: 7d   # Preview dihapus otomatis 7 hari setelah PR ditutup

      - name: Summary Preview URL
        run: |
          echo "## 🔍 Preview Deploy Berhasil" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Preview URL** | ${{ steps.preview_deploy.outputs.details_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Produksi URL** | https://psa-business-suite.web.app |" >> $GITHUB_STEP_SUMMARY
          echo "| **Expires** | 7 hari setelah PR ditutup |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Preview ini menggunakan Firestore **PRODUKSI** yang sama." >> $GITHUB_STEP_SUMMARY
          echo "> Hati-hati saat test fitur yang menulis data." >> $GITHUB_STEP_SUMMARY
