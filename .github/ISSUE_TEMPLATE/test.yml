name: Test Coverage
description: Usulkan penambahan unit test atau integration test
title: "[TEST] "
labels: ["test"]
body:
  - type: textarea
    id: description
    attributes:
      label: Deskripsi Test
      description: Modul atau fungsi apa yang perlu ditambahkan test?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Skenario Test (Langkah Reproduksi)
      description: Skenario apa saja yang harus dicakup? (Happy path, error path)
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: Apa hasil yang diharapkan dari test runner?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Kriteria agar test coverage ini dianggap memadai.
    validations:
      required: true
