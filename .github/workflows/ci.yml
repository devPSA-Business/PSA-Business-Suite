name: CI — Quality Gate

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality_gate:
    name: Lint · TypeCheck · Test · Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22
          cache: 'npm'

      - name: Cache npm
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c6158d # v4.2.0
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: TypeScript — Type Check
        run: npx tsc --noEmit

      - name: ESLint — Lint
        run: npm run lint

      - name: Vitest — Tests + Coverage
        env:
          VITE_CRYPTO_PEPPER: ${{ secrets.VITE_CRYPTO_PEPPER || 'ci-mocked-pepper' }}
          VITE_TELEGRAM_BOT_TOKEN: ${{ secrets.VITE_TELEGRAM_BOT_TOKEN || 'ci-mocked-token' }}
          VITE_TELEGRAM_CHAT_ID: ${{ secrets.VITE_TELEGRAM_CHAT_ID || 'ci-mocked-chat' }}
        run: npm run test:coverage

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@4cef321f55b9e0f6b3eec00e70417ee6a666e133 # v4.6.0
        with:
          name: coverage-report-${{ github.sha }}
          path: coverage/
          retention-days: 14

      - name: Enforce Coverage Thresholds
        run: |
          node -e "
          const fs = require('fs');
          let summary;
          try {
            summary = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8')).total;
          } catch (e) {
            console.warn('coverage-summary.json tidak ditemukan, skip threshold check.');
            process.exit(0);
          }
          const min = { lines: 80, statements: 80, branches: 75, functions: 80 };
          const failures = [];
          for (const k of Object.keys(min)) {
            const pct = summary[k]?.pct ?? 0;
            if (pct < min[k]) failures.push(k + ': ' + pct + '% < ' + min[k] + '%');
          }
          if (failures.length) {
            console.error('Coverage thresholds tidak terpenuhi:\n' + failures.join('\n'));
            process.exit(1);
          }
          console.log('Semua coverage thresholds terpenuhi ✓');
          "

      - name: Coverage Summary Comment (PR only)
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@5a78cb16e761204097ad8a39369ea5d0ff7c8a5d # v2.8.0
        with:
          json-summary-path: coverage/coverage-summary.json
