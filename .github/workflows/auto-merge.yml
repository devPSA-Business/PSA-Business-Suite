name: Dependabot Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Hanya berjalan untuk PR dari Dependabot
    if: github.actor == 'dependabot[bot]'

    steps:
      # actions/checkout v4.2.2 — pinned to full SHA (org policy)
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Fetch Dependabot metadata
        id: metadata
        # dependabot/fetch-metadata v2.2.0 — pinned to full SHA
        uses: dependabot/fetch-metadata@dbb049abf0d677abbd7f7eee0375145b417fdd34
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      # Auto-merge HANYA untuk patch dan minor — major butuh review manusia
      - name: Enable auto-merge for patch and minor updates
        if: ${{ steps.metadata.outputs.update-type == 'version-update:semver-patch' || steps.metadata.outputs.update-type == 'version-update:semver-minor' }}
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Tinggalkan komentar di PR major agar tidak terlewat
      - name: Flag major updates for manual review
        if: ${{ steps.metadata.outputs.update-type == 'version-update:semver-major' }}
        run: |
          gh pr reviewer "$PR_URL" --add "devPSA-Business" || true
          gh pr comment "$PR_URL" \
            --body "⚠️ **Major version update detected.** @devPSA-Business PR ini TIDAK akan di-merge otomatis. Harap periksa breaking changes sebelum merge manual."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
