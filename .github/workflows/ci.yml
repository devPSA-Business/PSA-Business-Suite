name: CI — Quality Gate (Lint + Type + Test Coverage)

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality_gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Type Check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint
        continue-on-error: false

      - name: Run Tests with Coverage
        env:
          # Gunakan Secrets di repo untuk nilai nyata; hanya contoh mocked untuk CI lokal
          VITE_CRYPTO_PEPPER: ${{ secrets.VITE_CRYPTO_PEPPER || 'mocked' }}
          VITE_TELEGRAM_BOT_TOKEN: ${{ secrets.VITE_TELEGRAM_BOT_TOKEN || 'mocked' }}
          VITE_TELEGRAM_CHAT_ID: ${{ secrets.VITE_TELEGRAM_CHAT_ID || 'mocked' }}
        run: npm run test:coverage

      - name: Upload Coverage Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.sha }}
          path: coverage/
          retention-days: 14

      - name: Enforce Coverage Thresholds
        if: always()
        run: |
          node -e "
          const fs = require('fs');
          const path = 'coverage/coverage-summary.json';
          if (!fs.existsSync(path)) { console.error('coverage-summary.json not found'); process.exit(1); }
          const summary = JSON.parse(fs.readFileSync(path, 'utf8')).total;
          const min = { lines: 80, statements: 80, branches: 75, functions: 80 };
          const failures = [];
          for (const k of Object.keys(min)) {
            const pct = summary[k] && summary[k].pct ? summary[k].pct : 0;
            if (pct < min[k]) failures.push(`${k}: ${pct}% < ${min[k]}%`);
          }
          if (failures.length) { console.error('Coverage thresholds not met:\\n' + failures.join('\\n')); process.exit(1); }
          console.log('Coverage thresholds met');"

      - name: Coverage Summary Comment (PR only)
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: coverage/coverage-summary.json

      - name: Create or Update PR Comment with CI Status
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            **CI Quality Gate**
            - Type check: ✅
            - Lint: ✅
            - Tests: ✅
            - Coverage: ${{ github.sha }}
            Artifact: coverage-report-${{ github.sha }}