# ══════════════════════════════════════════════════════════════════════════════
# Labeler Config — Mapping file path → label otomatis
# Digunakan oleh .github/workflows/labeler.yml (actions/labeler v5)
# ══════════════════════════════════════════════════════════════════════════════

# ── Area: Fitur Bisnis ────────────────────────────────────────────────────────
"area: auth":
  - changed-files:
    - any-glob-to-any-file: src/features/auth/**

"area: pos":
  - changed-files:
    - any-glob-to-any-file: src/features/pos/**

"area: inventory":
  - changed-files:
    - any-glob-to-any-file: src/features/inventory/**

"area: gold":
  - changed-files:
    - any-glob-to-any-file: src/features/gold/**

"area: reports":
  - changed-files:
    - any-glob-to-any-file:
      - src/features/reports/**
      - src/pages/reports/**

"area: customers":
  - changed-files:
    - any-glob-to-any-file: src/features/customers/**

"area: suppliers":
  - changed-files:
    - any-glob-to-any-file: src/features/suppliers/**

# ── Area: Infrastruktur & Keamanan ───────────────────────────────────────────
"area: infrastructure":
  - changed-files:
    - any-glob-to-any-file:
      - src/infrastructure/**
      - src/shared/api/db.ts
      - firestore.rules
      - storage.rules
      - database.rules.json

"area: security":
  - changed-files:
    - any-glob-to-any-file:
      - src/infrastructure/crypto/**
      - src/shared/store/useSecurityStore*
      - src/lib/cryptoIndexedDB*
      - src/features/auth/**
      - firestore.rules
      - SECURITY.md

"area: ci":
  - changed-files:
    - any-glob-to-any-file:
      - .github/workflows/**
      - .github/dependabot.yml
      - vite.config*
      - vitest.config*
      - tsconfig*

"area: docs":
  - changed-files:
    - any-glob-to-any-file:
      - "*.md"
      - docs/**
      - .github/ISSUE_TEMPLATE/**
      - .github/pull_request_template.md

"area: cloud-functions":
  - changed-files:
    - any-glob-to-any-file: functions/**

# ── Tipe Dependensi ───────────────────────────────────────────────────────────
"type: deps-patch":
  - head-branch: ["^dependabot/npm_and_yarn/.+"]

"type: deps-major":
  - head-branch: ["^dependabot/npm_and_yarn/.+"]

"type: deps-minor":
  - head-branch: ["^dependabot/npm_and_yarn/.+"]

"area: ai-context":
  - changed-files:
    - any-glob-to-any-file:
      - CONTEXT.md
      - SCOPE.md
      - INTERFACES.md
      - AGENTS.md
      - scripts/verify-ai-context.ts
