version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Jakarta"
    open-pull-requests-limit: 5
    groups:
      # === BARU: Vitest dan semua plugin-nya harus naik versi bersama ===
      vitest-ecosystem:
        patterns:
          - "vitest"
          - "@vitest/*"
      # Firebase SDK juga harus bergerak bersama
      firebase-sdk:
        patterns:
          - "firebase"
          - "@firebase/*"
      patch-updates:
        update-types:
          - "patch"
      minor-dev-updates:
        dependency-type: "development"
        update-types:
          - "minor"
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "build(deps)"
      prefix-development: "build(deps-dev)"
      include: "scope"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Jakarta"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
      - "automated"
    commit-message:
      prefix: "ci(deps)"
