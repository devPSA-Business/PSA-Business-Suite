name: CI — Quality Gate

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality_gate:
    name: Lint · TypeCheck · Test · Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # SHA diverifikasi dari repo resmi actions/checkout
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      # SHA diverifikasi dari repo resmi actions/setup-node
      - name: Setup Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: 'npm'

      # SHA diverifikasi dari dokumentasi resmi GitHub Actions 2026
      - name: Cache npm
        uses: actions/cache@d4323d4df104b026c6a166049fb557cb5d0bedfc # v4.2.0
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: TypeScript — Type Check
        run: npx tsc --noEmit

      - name: ESLint — Lint
        run: npm run lint

      - name: Vitest — Tests + Coverage
        env:
          VITE_CRYPTO_PEPPER: ${{ secrets.VITE_CRYPTO_PEPPER || 'ci-mocked-pepper' }}
          VITE_TELEGRAM_BOT_TOKEN: ${{ secrets.VITE_TELEGRAM_BOT_TOKEN || 'ci-mocked-token' }}
          VITE_TELEGRAM_CHAT_ID: ${{ secrets.VITE_TELEGRAM_CHAT_ID || 'ci-mocked-chat' }}
        run: npm run test:coverage

      # Gunakan version tag — SHA v4.x resmi tidak dapat diverifikasi saat ini
      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.sha }}
          path: coverage/
          retention-days: 14

      - name: Enforce Coverage Thresholds
        run: |
          node -e "
          const fs = require('fs');
          let summary;
          try {
            summary = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8')).total;
          } catch (e) {
            console.warn('coverage-summary.json tidak ditemukan, skip threshold check.');
            process.exit(0);
          }
          const min = { lines: 80, statements: 80, branches: 75, functions: 80 };
          const failures = [];
          for (const k of Object.keys(min)) {
            const pct = summary[k]?.pct ?? 0;
            if (pct < min[k]) failures.push(k + ': ' + pct + '% < ' + min[k] + '%');
          }
          if (failures.length) {
            console.error('Coverage thresholds tidak terpenuhi:\n' + failures.join('\n'));
            process.exit(1);
          }
          console.log('Semua coverage thresholds terpenuhi ✓');
          "

      # SHA diverifikasi dari repo resmi davelosert/vitest-coverage-report-action
      - name: Coverage Summary Comment (PR only)
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@5a78cb16e761204097ad8a39369ea5d0ff7c8a5d # v2.8.0
        with:
          json-summary-path: coverage/coverage-summary.json
