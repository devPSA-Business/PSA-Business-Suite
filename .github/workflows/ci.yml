name: CI — Quality Gate (Lint + Type + Test Coverage)

on:
  push:
    branches: [main, develop, feature/**, fix/**]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality_gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type Check & Lint
        run: npm run lint

      - name: Run Tests with Coverage
        run: npm run test:coverage

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@4cef321f55b9e0f6b3eec00e70417ee6a666e133 # v4.6.0
        if: always()
        with:
          name: coverage-report-${{ github.sha }}
          path: coverage/
          retention-days: 14

      - name: Coverage Summary Comment (PR only)
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@5a78cb16e761204097ad8a39369ea5d0ff7c8a5d # v2.8.0
        with:
          json-summary-path: coverage/coverage-summary.json
