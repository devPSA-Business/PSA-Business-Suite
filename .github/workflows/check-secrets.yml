# ══════════════════════════════════════════════════════════════════════════════
# Check Secrets — Validasi semua GitHub Secrets yang dibutuhkan sudah ada
# ══════════════════════════════════════════════════════════════════════════════
# OTOMATIS — Berjalan saat push ke main.
# Jika ada secret yang hilang, CI akan WARN (tidak fail) dengan instruksi jelas.
# ══════════════════════════════════════════════════════════════════════════════
name: Check Secrets Completeness

on:
  push:
    branches: [main]
    paths:
      - '.env.example'
      - '.github/workflows/ci.yml'
      - '.github/workflows/check-secrets.yml'
  workflow_dispatch:

jobs:
  check_secrets:
    name: Verifikasi GitHub Secrets
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Cek kelengkapan secrets
        env:
          # Firebase Core
          S_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          S_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          S_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          S_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          S_FIREBASE_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          S_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          # Security
          S_CRYPTO_PEPPER: ${{ secrets.VITE_CRYPTO_PEPPER }}
        run: |
          MISSING=0
          WARNINGS=""

          check() {
            local name=$1
            local val=$2
            local critical=$3
            if [ -z "$val" ]; then
              if [ "$critical" = "true" ]; then
                WARNINGS="$WARNINGS\n  ❌ WAJIB  : $name"
                MISSING=$((MISSING + 1))
              else
                WARNINGS="$WARNINGS\n  ⚠️  OPSIONAL: $name"
              fi
            else
              echo "  ✅ $name"
            fi
          }

          echo ""
          echo "═══════════════════════════════════════════════════"
          echo "  PSA Business Suite — Secrets Health Check"
          echo "═══════════════════════════════════════════════════"

          # Firebase (WAJIB untuk build production)
          check "VITE_FIREBASE_API_KEY"              "$S_FIREBASE_API_KEY"       "true"
          check "VITE_FIREBASE_AUTH_DOMAIN"          "$S_FIREBASE_AUTH_DOMAIN"   "true"
          check "VITE_FIREBASE_PROJECT_ID"           "$S_FIREBASE_PROJECT_ID"    "true"
          check "VITE_FIREBASE_STORAGE_BUCKET"       "$S_FIREBASE_STORAGE_BUCKET" "true"
          check "VITE_FIREBASE_MESSAGING_SENDER_ID"  "$S_FIREBASE_SENDER_ID"     "true"
          check "VITE_FIREBASE_APP_ID"               "$S_FIREBASE_APP_ID"        "true"
          # Keamanan (WAJIB)
          check "VITE_CRYPTO_PEPPER"                 "$S_CRYPTO_PEPPER"          "true"

          echo ""
          if [ "$MISSING" -gt 0 ]; then
            echo "═══════════════════════════════════════════════════"
            echo "⚠️  $MISSING secret WAJIB belum dikonfigurasi:"
            printf "$WARNINGS\n"
            echo ""
            echo "Cara mengisi:"
            echo "  1. Buka: https://github.com/${{ github.repository }}/settings/secrets/actions"
            echo "  2. Klik 'New repository secret'"
            echo "  3. Isi nama dan nilai sesuai .env.example"
            echo ""
            echo "Build production TIDAK AKAN BERJALAN tanpa secrets ini."
            echo "═══════════════════════════════════════════════════"
            exit 1
          else
            echo "═══════════════════════════════════════════════════"
            echo "✅ Semua secrets wajib sudah dikonfigurasi!"
            echo "═══════════════════════════════════════════════════"
          fi
