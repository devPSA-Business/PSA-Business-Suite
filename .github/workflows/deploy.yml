name: Deploy — Firebase Hosting & Functions

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'functions/**'
      - '*.html'
      - '*.json'
      - '*.ts'
      - '*.tsx'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_deploy:
    name: Build → Deploy Firebase
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      # SHA diverifikasi dari repo resmi actions/checkout
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      # SHA diverifikasi dari repo resmi actions/setup-node
      - name: Setup Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: 'npm'

      # SHA diverifikasi dari dokumentasi resmi GitHub Actions 2026
      - name: Cache npm
        uses: actions/cache@d4323d4df104b026c6a166049fb557cb5d0bedfc # v4.2.0
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: TypeScript — Type Check & Lint
        run: npm run lint

      - name: Build Production
        run: npm run build
        env:
          # ── Firebase Core ──────────────────────────────────────────
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_DATABASE_ID: ${{ secrets.VITE_FIREBASE_DATABASE_ID }}
          # ── Security & Monitoring ──────────────────────────────────
          VITE_CRYPTO_PEPPER: ${{ secrets.VITE_CRYPTO_PEPPER }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_RECAPTCHA_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_SITE_KEY }}

      # SHA diverifikasi dari repo resmi FirebaseExtended/action-hosting-deploy
      - name: Deploy Hosting ke Firebase
        id: firebase_deploy
        uses: FirebaseExtended/action-hosting-deploy@0cbcac4740c2bfb00d632f0b863b57713124eb5a # v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: live
          projectId: '${{ secrets.FIREBASE_PROJECT_ID }}'

      - name: Deploy Cloud Functions
        run: |
          cd functions
          npm ci
          npm run build
          echo "$FIREBASE_SERVICE_ACCOUNT" > ../temp_sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=$(realpath ../temp_sa.json)
          npx firebase-tools deploy --only functions \
            --project "${{ secrets.FIREBASE_PROJECT_ID }}" \
            --force
          rm -f ../temp_sa.json
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      # Gunakan version tag — SHA spesifik belum dapat diverifikasi sepenuhnya
      - name: Notifikasi Rilis Produksi
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: '[PSA Business Suite] 🚀 Rilis Produksi Berhasil'
          to: dev.psajewelry@gmail.com
          from: PSA CI/CD Bot
          body: |
            Halo Tim PSA,

            Bot GitHub Actions (CI/CD) melaporkan bahwa pembaruan PSA Business Suite
            telah BERHASIL DIPRODUKSI.

            Detail Rilis:
            - Cabang       : ${{ github.ref_name }}
            - Commit       : ${{ github.sha }}
            - Live URL     : ${{ steps.firebase_deploy.outputs.details_url }}
            - Waktu Deploy : ${{ github.event.head_commit.timestamp }}

            Seluruh audit kriptografi dan security state pass verifikasi.
            Aplikasi kasir siap digunakan.

            Salam,
            Sistem CI/CD PSA
