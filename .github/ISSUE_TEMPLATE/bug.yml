name: Bug Report
description: Laporkan bug atau error pada aplikasi
title: "[BUG] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Deskripsi Bug
      description: Jelaskan bug yang terjadi secara detail.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Langkah Reproduksi
      description: Langkah-langkah untuk mereproduksi bug.
      value: |
        1. Buka halaman '...'
        2. Klik tombol '...'
        3. Lihat error '...'
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: Apa yang seharusnya terjadi?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Kriteria agar bug ini dianggap selesai diperbaiki.
    validations:
      required: true
