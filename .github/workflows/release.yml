# ══════════════════════════════════════════════════════════════════════════════
# Release — Build · Test · Tag · GitHub Release
# ══════════════════════════════════════════════════════════════════════════════
# OTOMATIS — Trigger saat push tag v*.
# Pipeline: build + test HARUS lulus sebelum release dibuat.
# ══════════════════════════════════════════════════════════════════════════════
name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'      # v1.4.0
      - 'v[0-9]+.[0-9]+.[0-9]+-*'    # v1.4.0-rc.1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false # Jangan cancel release yang sedang jalan

jobs:
  # ── Gate: Build & Test sebelum release ────────────────────────────────────
  pre_release_gate:
    name: Pre-Release Gate (Build + Test)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      version: ${{ steps.extract.outputs.version }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript Check
        run: npx tsc --noEmit

      - name: Run Tests
        env:
          VITE_CRYPTO_PEPPER: ${{ secrets.VITE_CRYPTO_PEPPER || 'ci-release-pepper-minimum-32chars' }}
        run: npm test

      - name: Build Production
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_DATABASE_ID: ${{ secrets.VITE_FIREBASE_DATABASE_ID }}
          VITE_CRYPTO_PEPPER: ${{ secrets.VITE_CRYPTO_PEPPER }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

      - name: Extract version from tag
        id: extract
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify version matches package.json
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${{ steps.extract.outputs.version }}
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Version mismatch: package.json=$PKG_VERSION, tag=$TAG_VERSION"
            exit 1
          fi
          echo "✅ Version match: $PKG_VERSION"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.ref_name }}
          path: dist/
          retention-days: 90

  # ── Create GitHub Release ─────────────────────────────────────────────────
  create_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: pre_release_gate
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.ref_name }}
          path: dist/

      - name: Create release archive
        run: |
          VERSION=${{ needs.pre_release_gate.outputs.version }}
          tar -czf "psa-business-suite-v${VERSION}.tar.gz" dist/
          echo "Release archive: psa-business-suite-v${VERSION}.tar.gz"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191 # v2.2.1
        with:
          name: "PSA Business Suite v${{ needs.pre_release_gate.outputs.version }}"
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: psa-business-suite-v*.tar.gz
          body: |
            ## PSA Business Suite v${{ needs.pre_release_gate.outputs.version }}

            > Build telah diverifikasi: TypeScript ✅ | Tests ✅ | Build ✅

            Lihat **[Release Notes otomatis]** di bawah untuk detail perubahan.

            ### Instalasi
            ```bash
            git clone https://github.com/devPSA-Business/PSA-Business-Suite.git
            git checkout ${{ github.ref_name }}
            npm install
            cp .env.example .env.local
            # Isi .env.local dengan kredensial Firebase Anda
            npm run build
            ```
