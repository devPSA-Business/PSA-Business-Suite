feature:
  - changed-files:
    - any-glob-to-any-file: 'src/features/**'

core:
  - changed-files:
    - any-glob-to-any-file: 'src/application/**'
    - any-glob-to-any-file: 'src/domain/**'

infrastructure:
  - changed-files:
    - any-glob-to-any-file: 'src/infrastructure/**'
    - any-glob-to-any-file: 'src/shared/api/**'

ui:
  - changed-files:
    - any-glob-to-any-file: 'src/shared/components/**'
    - any-glob-to-any-file: 'src/index.css'

tests:
  - changed-files:
    - any-glob-to-any-file: 'tests/**'

ci-cd:
  - changed-files:
    - any-glob-to-any-file: '.github/**'

docs:
  - changed-files:
    - any-glob-to-any-file: 'docs/**'
    - any-glob-to-any-file: '*.md'
