name: 🔐 Bootstrap — Auto-Generate Secrets (Run Once)

# @ai_context: Workflow self-bootstrapping untuk generate secrets kriptografis
# yang tidak bisa dibuat manual oleh owner (CRYPTO_PEPPER, dll).
# HANYA dijalankan SEKALI oleh owner saat setup awal atau reset.
# Setelah sukses, workflow ini TIDAK membocorkan nilai secret ke log.
#
# PRASYARAT:
#   - PAT dengan scope: secrets:write, actions:write
#   - Set sebagai secret PAT_SECRETS_WRITE sebelum menjalankan ini
#
# CARA PAKAI:
#   1. GitHub → Settings → Secrets → New secret
#      Name: PAT_SECRETS_WRITE | Value: (token fine-grained kamu)
#   2. GitHub → Actions → Bootstrap Secrets → Run workflow

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Secret mana yang di-generate ulang?'
        required: true
        default: 'all-generated'
        type: choice
        options:
          - all-generated       # VITE_CRYPTO_PEPPER (semua yang bisa di-generate)
          - pepper-only         # Hanya VITE_CRYPTO_PEPPER

jobs:
  generate_and_set_secrets:
    name: Generate & Set Cryptographic Secrets
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read   # Minimal — tidak perlu lebih

    steps:
      - name: Verify Actor
        run: |
          echo "🔐 Bootstrap dijalankan oleh: ${{ github.actor }}"
          echo "   Repo : ${{ github.repository }}"
          echo "   Input: ${{ github.event.inputs.target }}"

      # ── Generate VITE_CRYPTO_PEPPER ───────────────────────────────────────
      # PBKDF2 pepper: 32 bytes random = 64 hex chars
      # TIDAK pernah dicetak ke log — langsung di-mask
      - name: Generate VITE_CRYPTO_PEPPER
        if: contains(github.event.inputs.target, 'pepper') || github.event.inputs.target == 'all-generated'
        env:
          GH_TOKEN: ${{ secrets.PAT_SECRETS_WRITE }}
        run: |
          # Generate 32 bytes kriptografis menggunakan /dev/urandom (Linux kernel RNG)
          # Format: hex lowercase 64 chars — kompatibel dengan Web Crypto PBKDF2
          NEW_PEPPER=$(openssl rand -hex 32)
          
          # Mask dari log GitHub Actions (tidak akan muncul di output)
          echo "::add-mask::${NEW_PEPPER}"
          
          # Set sebagai GitHub Secret via API
          RESPONSE=$(gh api \
            --method PUT \
            "/repos/${{ github.repository }}/actions/secrets/VITE_CRYPTO_PEPPER" \
            --field "encrypted_value=$(echo -n "${NEW_PEPPER}" | gh secret set VITE_CRYPTO_PEPPER --body - 2>/dev/null; echo skip)" \
            2>&1 || true)
          
          # Cara alternatif yang lebih reliable
          echo "${NEW_PEPPER}" | gh secret set VITE_CRYPTO_PEPPER
          
          echo "✅ VITE_CRYPTO_PEPPER berhasil di-set (${#NEW_PEPPER} chars, tidak ditampilkan)"
          echo "⚠️  PERHATIAN: Jika ada user yang sudah punya PIN lama, mereka perlu RESET PIN"
          echo "   karena pepper baru = hash lama tidak valid"

      # ── Status Report ──────────────────────────────────────────────────────
      - name: Summary
        run: |
          echo "## 🔐 Bootstrap Secrets Selesai" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Secret | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| VITE_CRYPTO_PEPPER | ✅ Di-generate ulang (64 hex chars, PBKDF2-safe) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ⚠️ Langkah Berikutnya" >> $GITHUB_STEP_SUMMARY
          echo "Secrets berikut HARUS diisi manual oleh Owner:" >> $GITHUB_STEP_SUMMARY
          echo "- \`VITE_FIREBASE_API_KEY\` — Firebase Console → Project Settings" >> $GITHUB_STEP_SUMMARY
          echo "- \`VITE_FIREBASE_AUTH_DOMAIN\` — Firebase Console → Project Settings" >> $GITHUB_STEP_SUMMARY
          echo "- \`VITE_FIREBASE_PROJECT_ID\` — Firebase Console → Project Settings" >> $GITHUB_STEP_SUMMARY
          echo "- \`VITE_FIREBASE_STORAGE_BUCKET\` — Firebase Console → Project Settings" >> $GITHUB_STEP_SUMMARY
          echo "- \`VITE_FIREBASE_MESSAGING_SENDER_ID\` — Firebase Console → Project Settings" >> $GITHUB_STEP_SUMMARY
          echo "- \`VITE_FIREBASE_APP_ID\` — Firebase Console → Project Settings" >> $GITHUB_STEP_SUMMARY
          echo "- \`FIREBASE_SERVICE_ACCOUNT\` — Firebase Console → Project Settings → Service Accounts → Generate key" >> $GITHUB_STEP_SUMMARY
          echo "- \`FIREBASE_PROJECT_ID\` — Sama persis dengan VITE_FIREBASE_PROJECT_ID" >> $GITHUB_STEP_SUMMARY
          echo "- \`FIREBASE_DEPLOY_TOKEN\` — Jalankan: \`npx firebase-tools login:ci\`" >> $GITHUB_STEP_SUMMARY
