name: Runbook Update
description: Usulkan penambahan atau pembaruan panduan operasional (Runbook)
title: "[RUNBOOK] "
labels: ["runbook"]
body:
  - type: textarea
    id: description
    attributes:
      label: Deskripsi Runbook
      description: Prosedur operasional apa yang perlu didokumentasikan?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Langkah Prosedur (Reproduksi)
      description: Langkah-langkah operasional yang akan didokumentasikan.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: Apa hasil akhir dari prosedur ini?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Kriteria agar runbook ini dianggap valid dan selesai.
    validations:
      required: true
