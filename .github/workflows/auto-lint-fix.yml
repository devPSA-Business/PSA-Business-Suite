name: Auto Lint Fix

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-fix:
    runs-on: ubuntu-latest
    # Jangan jalankan untuk PR dari Dependabot (sudah ditangani auto-merge.yml)
    if: github.actor != 'dependabot[bot]'

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          # Checkout ke branch PR bukan merge commit
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint Auto-Fix
        run: npx eslint src --fix
        # Jika tidak ada yang perlu difix, tetap lanjut (exit 0)
        continue-on-error: true

      - name: Check if any files changed
        id: diff
        run: |
          git diff --exit-code || echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Commit auto-fix changes
        if: steps.diff.outputs.has_changes == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(lint): auto-fix ESLint warnings [skip ci]"
          git push
