name: CI — Quality Gate (Lint + Type + Test Coverage)

on:
  push:
    branches: [main, develop, feature/**, fix/**]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality_gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type Check & Lint
        run: npm run lint

      - name: Run Tests with Coverage
        run: npm run test:coverage
        env:
          # Pepper dan token telah dipindahkan ke Secret Manager / Backend
          VITE_CRYPTO_PEPPER: "mocked"
          VITE_TELEGRAM_BOT_TOKEN: "mocked"
          VITE_TELEGRAM_CHAT_ID: "mocked"

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-${{ github.sha }}
          path: coverage/
          retention-days: 14

      - name: Coverage Summary Comment (PR only)
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: coverage/coverage-summary.json
